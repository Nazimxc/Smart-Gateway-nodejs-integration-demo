<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Checkout</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0f172a,#2563eb);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.container{
    background:white;
    padding:35px;
    width:420px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:13px;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    font-size:14px;
    font-weight:600;
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

.btn{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    background:#1d4ed8;
}

.footer{
    text-align:center;
    font-size:12px;
    color:#777;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Merchant Checkout</div>
<div class="subtitle">Test Payment Integration</div>

<form method="post" action="initiatePayment">

<div class="form-group">
<label>Order ID</label>
<input type="text" name="order_id" id="order_id" readonly>
</div>

<div class="form-group">
<label>Amount</label>
<input type="text" name="amount" value="1.00" readonly>
</div>

<div class="form-group">
<label>Client ID</label>
<input type="text" name="payment_page_client_id" value="hdfcmaster" readonly>
</div>

<div class="form-group">
<label>Currency</label>
<input type="text" name="currency" value="INR" readonly>
</div>

<div class="form-group">
<label>Return URL</label>
<input type="text" name="redirect_url"
value="http://localhost:5000/handlePaymentResponse" readonly>
</div>

<button class="btn" type="submit">
Proceed to Payment
</button>

</form>

<div class="footer">
Demo Payment Form • Integration Testing
</div>

</div>

<script>

document.getElementById("order_id").value = "ord_" + Date.now();

</script>

</body>
</html>
